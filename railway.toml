# Railway service config for Common-Waste Paperclip.
# Connect this repo in the Railway dashboard; pushes to the linked branch auto-deploy.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
